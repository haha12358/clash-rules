proxy-providers:
  aaa:
    url: "订阅"
    type: http
    path: ./proxy_providers/aaa.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: DIRECT
    override:
      udp: true
      additional-prefix: '[名字]'

mixed-port: 7890
allow-lan: false
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=218.201.4.0/24
  fake-ip-filter:
    - "rule-set:fakeip-filter"

proxy-groups:
  - { name: '🚀 默认', type: select, proxies: ['🇭🇰 香港', '🇸🇬 新加坡', '🇯🇵 日本', '🇨🇳 台湾', '🇺🇸 美国', '🇺🇳 全部'] }
  - { name: '🤖 AI', type: select, include-all: true, filter: "(?i)日本|美国" }
  - { name: '🎬 流媒体', type: select, include-all: true, proxies: ['😄 低倍率', '♻️ 自动选择'] }
  - { name: '🇯🇵 日本', type: select, include-all: true, proxies: ['♻️ 日本自动','🔯 日本故转'], filter: "(?i)日本|jp|japan" }
  - { name: '🇭🇰 香港', type: select, include-all: true, proxies: ['♻️ 香港自动','🔯 香港故转'], filter: "(?i)香港|hk|hongkong|hong kong" }
  - { name: '🇸🇬 新加坡', type: select, include-all: true, proxies: ['♻️ 新加坡自动','🔯 新加坡故转'], filter: "(?i)新加坡|sg|singapore" }
  - { name: '🇨🇳 台湾', type: select, include-all: true, proxies: ['♻️ 台湾自动','🔯 台湾故转'], filter: "(?i)台湾|tw|taiwan" }
  - { name: '🇺🇸 美国', type: select, include-all: true, proxies: ['♻️ 美国自动','🔯 美国故转'], filter: "(?i)美国|us|unitedstates|united states" }
  - { name: '🇺🇳 全部', type: select, include-all: true, proxies: ['♻️ 自动选择','🔯 故障转移'] }
  - { name: '➡️ 直连', type: select, proxies: [DIRECT, '🚀 默认'] }
  - { name: '🏠 局域网', type: select, proxies: ['➡️ 直连', '🚀 默认'] }
  - { name: '🐟️ 漏网之鱼', type: select, proxies: ['🚀 默认', '➡️ 直连'] }
  - { name: '🚫 广告', type: select, proxies: [REJECT,REJECT-DROP] }
  - { name: '😄 低倍率', type: select, include-all: true, filter: "(?i)实验|低|0\\." }
  - { name: '♻️ 香港自动', type: url-test, include-all: true, hidden: true, tolerance: 20, interval: 300, filter: "(?i)香港|hk|hongkong|hong kong" }
  - { name: '♻️ 新加坡自动', type: url-test, include-all: true, hidden: true, tolerance: 20, interval: 300, filter: "(?i)新加坡|sg|singapore" }
  - { name: '♻️ 日本自动', type: url-test, include-all: true, hidden: true, tolerance: 20, interval: 300, filter: "(?i)日本|jp|japan" }
  - { name: '♻️ 台湾自动', type: url-test, include-all: true, hidden: true, tolerance: 20, interval: 300, filter: "(?i)台湾|tw|taiwan" }
  - { name: '♻️ 美国自动', type: url-test, include-all: true, hidden: true, tolerance: 20, interval: 300, filter: "(?i)美国|us|unitedstates|united states" }
  - { name: '♻️ 自动选择', type: url-test, include-all: true, hidden: true, tolerance: 20, interval: 300}
  - { name: '🔯 香港故转', type: fallback, include-all: true, hidden: true, tolerance: 20, interval: 300, filter: "(?i)香港|hk|hongkong|hong kong" }
  - { name: '🔯 新加坡故转', type: fallback, include-all: true, hidden: true, tolerance: 20, interval: 300, filter: "(?i)新加坡|sg|singapore" }
  - { name: '🔯 日本故转', type: fallback, include-all: true, hidden: true, tolerance: 20, interval: 300, filter: "(?i)日本|jp|japan" }
  - { name: '🔯 台湾故转', type: fallback, include-all: true, hidden: true, tolerance: 20, interval: 300, filter: "(?i)台湾|tw|taiwan" }
  - { name: '🔯 美国故转', type: fallback, include-all: true, hidden: true, tolerance: 20, interval: 300, filter: "(?i)美国|us|unitedstates|united states" }
  - { name: '🔯 故障转移', type: fallback, include-all: true, hidden: true, tolerance: 20, interval: 300 }

rule-anchor:
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: yaml}

rule-providers:
  fakeip-filter: {<<: *domain, url: "https://raw.githubusercontent.com/haha12358/clash-rules/release/fakeip-filter.mrs", path: ./ruleset/fakeip-filter.mrs}
  reject: {<<: *domain, url: "https://raw.githubusercontent.com/privacy-protection-tools/anti-ad.github.io/master/docs/mihomo.mrs", path: ./ruleset/reject.mrs}
  icloud: {<<: *domain, url: "https://raw.githubusercontent.com/haha12358/clash-rules/release/icloud.mrs", path: ./ruleset/icloud.mrs}
  apple: {<<: *domain, url: "https://raw.githubusercontent.com/haha12358/clash-rules/release/apple.mrs", path: ./ruleset/apple.mrs}
  google: {<<: *domain, url: "https://raw.githubusercontent.com/haha12358/clash-rules/release/google.mrs", path: ./ruleset/google.mrs}
  proxy: {<<: *domain, url: "https://raw.githubusercontent.com/haha12358/clash-rules/release/proxy.mrs", path: ./ruleset/proxy.mrs}
  direct: {<<: *domain, url: "https://raw.githubusercontent.com/haha12358/clash-rules/release/direct.mrs", path: ./ruleset/direct.mrs}
  ai: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs", path: ./ruleset/ai.mrs}
  github: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs", path: ./ruleset/github.mrs}  #GitHubCopilot插件使用AI规则的节点会网络错误
  entertainment: {<<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-entertainment.mrs", path: ./ruleset/entertainment.mrs}
  private: {<<: *domain, url: "https://raw.githubusercontent.com/haha12358/clash-rules/release/private.mrs", path: ./ruleset/private.mrs}

  telegramcidr: {<<: *ip, url: "https://raw.githubusercontent.com/haha12358/clash-rules/release/telegramcidr.mrs", path: ./ruleset/telegramcidr.mrs}
  cncidr: {<<: *ip, url: "https://raw.githubusercontent.com/haha12358/clash-rules/release/cncidr.mrs", path: ./ruleset/cncidr.mrs}
  lancidr: {<<: *ip, url: "https://raw.githubusercontent.com/haha12358/clash-rules/release/lancidr.mrs", path: ./ruleset/lancidr.mrs}

  applications: {<<: *class, url: "https://raw.githubusercontent.com/haha12358/clash-rules/release/applications.yaml", path: ./ruleset/applications.yaml}
  diy-direct: {<<: *class, url: "https://raw.githubusercontent.com/haha12358/clash-rules/hidden/diy-direct.yaml", path: ./ruleset/diy-direct.yaml}
  diy-proxy: {<<: *class, url: "https://raw.githubusercontent.com/haha12358/clash-rules/hidden/diy-proxy.yaml", path: ./ruleset/diy-proxy.yaml}

rules:
  - RULE-SET,applications,➡️ 直连
  - DOMAIN,clash.razord.top,➡️ 直连
  - DOMAIN,yacd.haishan.me,➡️ 直连

  - RULE-SET,private,➡️ 直连
  - RULE-SET,reject,🚫 广告

  - RULE-SET,diy-direct,➡️ 直连
  - RULE-SET,diy-proxy,🚀 默认

  - RULE-SET,github,🚀 默认
  - RULE-SET,ai,🤖 AI
  - RULE-SET,entertainment,🎬 流媒体
  - RULE-SET,icloud,➡️ 直连
  - RULE-SET,apple,➡️ 直连
  - RULE-SET,google,🚀 默认

  - RULE-SET,proxy,🚀 默认
  - RULE-SET,direct,➡️ 直连
  
  - RULE-SET,lancidr,🏠 局域网,no-resolve
  - RULE-SET,telegramcidr,🚀 默认,no-resolve
  - RULE-SET,cncidr,➡️ 直连

  - GEOIP,LAN,➡️ 直连
  - GEOIP,CN,➡️ 直连

  - MATCH,🐟️ 漏网之鱼
